# freakquery/config.toml

[core]
name = "FreakQuery"
version = "3.1.0"
default_format = "text"

[shell]
prompt = "fq> "
banner = true
help_hint = "Type .help"
bye_message = "bye"
confirm_exit = false
show_os = true
show_python = false
clear_mode = "ansi"
timing_precision = 3

[render]
separator = ", "
parens = true
dose = true
unit = true
labels = true
count = false
percent = true
compact = false
time = false
ratio_under_one = "<1%"

[query]
reverse = false

[grouping]
binge_gap_hours = 8

[fields]
substance = ["substance", "substanceName", "name", "drug"]
route = ["route", "roa", "administrationRoute", "adminRoute"]
site = ["site", "administrationSite", "bodySite", "siteName"]
dose = ["dose", "amount", "quantity"]
unit = ["unit", "units"]
time = ["time", "creationDate", "timestamp", "date"]

[aliases.route]
iv = "intravenous"
inject = "intravenous"
injected = "intravenous"
intravenous = "intravenous"

oral = "oral"
po = "oral"
swallowed = "oral"

insufflated = "intranasal"
snorted = "intranasal"
snort = "intranasal"
nasal = "intranasal"
intranasal = "intranasal"

smoked = "vaporized"
vaped = "vaporized"
vapourized = "vaporized"
vaporized = "vaporized"

rectal = "intrarectal"
boof = "intrarectal"
boofed = "intrarectal"
intrarectal = "intrarectal"

sublingual = "sublingual"
transdermal = "transdermal"

[aliases.site]
"l nostril" = "left nostril"
"left nostril" = "left nostril"

"r nostril" = "right nostril"
"right nostril" = "right nostril"

"both nose" = "both nostrils"
"both nostrils" = "both nostrils"

"left hand" = "left dorsal hand"
"right hand" = "right dorsal hand"

[limits]
default = 10
rows = 100
top_substances = 10
top_routes = 10
ratio = 8
sites = 10
binges = 5
streaks = 5