# freakquery/config.toml

[core]
name = "FreakQuery"
version = "3.2.1"
default_format = "text"

[shell]
prompt = "fq> "
banner = true
help_hint = "Type .help"
bye_message = "fye bye freak"
confirm_exit = false
show_os = true
show_python = false
clear_mode = "ansi"
timing_precision = 3

[render]
separator = ", "
parens = true
dose = true
unit = true
labels = true
count = false
percent = true
compact = false
time = false
ratio_under_one = "<1%"

[query]
reverse = false

[grouping]
binge_gap_hours = 8

[fields]

substance = [
  "substance",
  "substanceName",
  "name",
  "drug",
  "compound"
]

route = ["route", "roa", "administrationRoute", "adminRoute"]

site = ["site", "administrationSite", "bodySite", "siteName"]

dose = [
  "dose",
  "amount",
  "qty",
  "quantity"
]

unit = [
  "unit",
  "units",
  "measurement"
]

time = [
  "time",
  "creationDate",
  "timestamp",
  "date"
]

[limits]
default = 10
rows = 100
top_substances = 10
top_routes = 10
ratio = 8
sites = 10
binges = 5
streaks = 5

[aliases.route]
iv = "intravenous"
inject = "intravenous"
injected = "intravenous"
intravenous = "intravenous"

oral = "oral"
po = "oral"
